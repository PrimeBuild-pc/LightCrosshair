# Codecov configuration for LightCrosshair
# Documentation: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        # Require at least 70% coverage, fail if it drops by more than 5%
        target: 70
        threshold: 5%
        informational: false
    patch:
      default:
        target: 80
        threshold: 5%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: false

ignore:
  - "**/*.Tests"
  - "**/*.Designer.cs"
  - "**/bin"
  - "**/obj"
